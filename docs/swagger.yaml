basePath: /api/v1
definitions:
  domain.DailyUsage:
    properties:
      cost_usd:
        type: number
      date:
        type: string
      total_tokens:
        type: integer
    type: object
  domain.DashboardMetrics:
    properties:
      daily_trend:
        items:
          $ref: '#/definitions/domain.DailyUsage'
        type: array
      top_users:
        items:
          $ref: '#/definitions/domain.UserCost'
        type: array
      total_cost_this_month:
        type: number
    type: object
  domain.Document:
    properties:
      created_at:
        type: string
      file_size_bytes:
        type: integer
      filename:
        type: string
      folder_id:
        type: string
      id:
        type: string
      is_deprecated:
        type: boolean
      previous_version_id:
        type: string
      status:
        type: string
      updated_at:
        type: string
      uploaded_by:
        type: string
      version:
        type: integer
    type: object
  domain.UserCost:
    properties:
      email:
        description: Joined from users table
        type: string
      name:
        description: Joined from users table
        type: string
      total_cost:
        type: number
      user_id:
        type: string
    type: object
  v1.ChatPayload:
    properties:
      document_filters:
        items:
          type: string
        type: array
      llm_temperature:
        type: number
      message:
        type: string
      session_id:
        type: string
    required:
    - message
    - session_id
    type: object
  v1.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  v1.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  v1.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      role_id:
        type: integer
      username:
        type: string
    required:
    - email
    - password
    - role_id
    - username
    type: object
  v1.SSOLoginRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  v1.UpdateRoleRequest:
    properties:
      role_id:
        type: integer
    required:
    - role_id
    type: object
  v1.UpdateStatusRequest:
    properties:
      is_banned:
        type: boolean
    type: object
  v1.submitFeedbackRequest:
    properties:
      comment:
        type: string
      message_id:
        type: string
      rating:
        type: integer
    required:
    - message_id
    - rating
    type: object
host: localhost:8000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Ini adalah dokumentasi API Gateway untuk proyek TELIS (Telkom Legal
    Intelligence System).
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: TELIS API Gateway
  version: "3.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Menghasilkan JWT Access Token dan Refresh Token jika kredensial
        valid.
      parameters:
      - description: Payload Login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil login, mengembalikan token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized (Password salah atau user tidak ada)
          schema:
            additionalProperties: true
            type: object
      summary: Login pengguna
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Memperbarui Access Token menggunakan Refresh Token
      parameters:
      - description: Payload Refresh
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil refresh, mengembalikan token baru
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized (Token tidak valid)
          schema:
            additionalProperties: true
            type: object
      summary: Refresh Token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Mendaftarkan pengguna baru dengan Role tertentu. Hanya user dengan
        Role Admin yang bisa mengeksekusi ini.
      parameters:
      - description: Payload Pendaftaran
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Berhasil didaftarkan
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden (Bukan Admin)
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict (Email/Username sudah dipakai)
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Daftarkan pengguna baru (Khusus Admin)
      tags:
      - Auth
  /auth/sso/google:
    post:
      consumes:
      - application/json
      description: Login menggunakan email dari provider SSO (seperti Google). Memerlukan
        header X-Internal-Secret.
      parameters:
      - description: Internal Secret
        in: header
        name: X-Internal-Secret
        required: true
        type: string
      - description: Payload SSO Login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.SSOLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil login, mengembalikan token
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized (Secret salah atau Akun tidak terdaftar)
          schema:
            additionalProperties: true
            type: object
      summary: Login SSO (Internal Frontend Only)
      tags:
      - Auth
  /chat/feedback:
    post:
      consumes:
      - application/json
      description: Menyimpan rating jempol dan komentar dari user untuk evaluasi RAG
        (Data Flywheel). UserID diambil secara otomatis dari token JWT.
      parameters:
      - description: Payload Feedback
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.submitFeedbackRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Feedback tersimpan
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Kirim Umpan Balik (HITL)
      tags:
      - Chat
  /chat/stream:
    post:
      consumes:
      - application/json
      description: Mengirim pesan ke AI Agent dan menerima respons secara streaming
        (Server-Sent Events).
      parameters:
      - description: Payload Chat
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.ChatPayload'
      produces:
      - text/event-stream
      responses:
        "200":
          description: Server-Sent Events stream
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Bad Gateway (Agent mati)
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Chat dengan Agen RAG (SSE)
      tags:
      - Chat
  /documents:
    get:
      description: Mengambil daftar dokumen dengan fitur paginasi dan pencarian.
      parameters:
      - description: Limit (default 10)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      - description: Search by filename
        in: query
        name: search
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by is_deprecated
        in: query
        name: is_deprecated
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Ambil Daftar Dokumen
      tags:
      - Document
  /documents/{id}:
    delete:
      consumes:
      - application/json
      description: Menghapus dokumen PDF, Vektor di Qdrant, dan entitas di Neo4j secara
        permanen.
      parameters:
      - description: ID Dokumen
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Perintah penghapusan masuk antrean
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Hapus Dokumen Permanen
      tags:
      - Document
    get:
      description: Mengambil detail metadata 1 dokumen berdasarkan ID.
      parameters:
      - description: ID Dokumen
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Document'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Detail Dokumen
      tags:
      - Document
  /documents/{id}/deprecate:
    post:
      consumes:
      - application/json
      description: Mengusangkan dokumen lama (mencabut vektor & graph) tanpa menghapus
        file fisiknya.
      parameters:
      - description: ID Dokumen
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Perintah pengusangan masuk antrean
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Usangkan Dokumen
      tags:
      - Document
  /documents/{id}/download:
    get:
      description: Mengunduh file fisik PDF dari dokumen yang tersimpan di sistem.
      parameters:
      - description: ID Dokumen
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/pdf
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Unduh PDF Dokumen
      tags:
      - Document
  /documents/upload:
    post:
      consumes:
      - multipart/form-data
      description: Mengunggah dokumen PDF untuk diproses oleh Celery Ingestion Worker.
      parameters:
      - description: File PDF Dokumen Hukum
        in: formData
        name: file
        required: true
        type: file
      - description: ID Dokumen versi lama jika dokumen ini adalah revisi
        in: formData
        name: replaces_document_id
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Diterima dan masuk antrean
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Unggah Dokumen PDF
      tags:
      - Document
  /folders:
    get:
      description: Mengambil daftar folder. Jika parent_id dikosongkan, akan mengambil
        root folder.
      parameters:
      - description: ID Folder Induk (kosongkan untuk root)
        in: query
        name: parent_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Daftar Folder
      tags:
      - Folder
    post:
      consumes:
      - application/json
      description: Membuat folder baru. Bisa disarangkan ke dalam folder lain menggunakan
        parent_id.
      parameters:
      - description: Payload Buat Folder (name, parent_id)
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Buat Folder Baru
      tags:
      - Folder
  /folders/{id}:
    delete:
      description: Menghapus folder, seluruh sub-folder di dalamnya, beserta memicu
        penghapusan dokumen secara permanen dari Storage, Qdrant, dan Neo4j.
      parameters:
      - description: ID Folder
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Hapus Folder (Cascading Delete)
      tags:
      - Folder
    put:
      consumes:
      - application/json
      description: Mengganti nama sebuah folder berdasarkan ID.
      parameters:
      - description: ID Folder
        in: path
        name: id
        required: true
        type: string
      - description: Payload Ganti Nama (name)
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Ganti Nama Folder
      tags:
      - Folder
  /metrics/tokens:
    get:
      description: Mengambil total biaya LLM bulan ini, top 5 pengguna, dan tren penggunaan
        harian.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.DashboardMetrics'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden (Bukan Admin)
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Dapatkan Dashboard Metrik Token (Khusus Admin)
      tags:
      - Metrics
  /metrics/tokens/me:
    get:
      description: Mengambil total biaya LLM yang telah dihabiskan oleh pengguna yang
        sedang login di bulan ini.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Dapatkan Metrik Token Saya Sendiri
      tags:
      - Metrics
  /redlines:
    post:
      consumes:
      - multipart/form-data
      description: Mengunggah dokumen source dan target untuk proses komparasi klausul
        dan redlining.
      parameters:
      - description: File PDF Kontrak Lama (Source)
        in: formData
        name: source_file
        required: true
        type: file
      - description: File PDF Kontrak Baru (Target)
        in: formData
        name: target_file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "202":
          description: Proses komparasi berhasil di-antrekan
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Unggah Dokumen Redline
      tags:
      - Redline
  /redlines/{id}:
    get:
      consumes:
      - application/json
      description: Mengambil status (PENDING/PROCESSING/COMPLETED/FAILED) dan hasil
        komparasi kontrak berdasarkan Job ID.
      parameters:
      - description: Redline Job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Status & Hasil Redline
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found (Job ID tidak ada)
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Ambil Status & Hasil Redline
      tags:
      - Redline
  /users:
    get:
      description: Mengambil semua data pengguna dengan paginasi dan filter. Hanya
        bisa diakses oleh Admin.
      parameters:
      - description: 'Nomor halaman (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Jumlah data per halaman (default: 10)'
        in: query
        name: limit
        type: integer
      - description: Pencarian nama atau email
        in: query
        name: search
        type: string
      - description: Filter berdasarkan Role ID (1=Admin, 2=User, 3=Legal)
        in: query
        name: role_id
        type: integer
      - description: Filter berdasarkan status banned
        in: query
        name: is_banned
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Daftar pengguna dengan metadata paginasi
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden (Bukan Admin)
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Ambil daftar semua pengguna (Khusus Admin)
      tags:
      - Users
  /users/{id}/ban:
    put:
      consumes:
      - application/json
      description: Membanned atau melepas banned pengguna. Admin tidak bisa menge-ban
        dirinya sendiri.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Payload Update Status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.UpdateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil diubah
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Ban atau Unban pengguna (Khusus Admin)
      tags:
      - Users
  /users/{id}/role:
    put:
      consumes:
      - application/json
      description: Mengubah wewenang (Role) pengguna. Admin tidak bisa mengubah rolenya
        sendiri.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Payload Update Role
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/v1.UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil diubah
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Ubah Role pengguna (Khusus Admin)
      tags:
      - Users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
